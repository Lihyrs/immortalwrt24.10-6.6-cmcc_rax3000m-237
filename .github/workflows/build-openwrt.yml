name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  BUILD_REQUIRED: build-required.sh
  FEEDS_CONFIG: feeds-config.yml
  CONFIG_FILE: .config
#   DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  REPLACE_PACKAGE: replace-package.sh
  DEFAULT_IP: 192.168.6.1
  WANNA_IP: 192.168.1.1
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # 新增环境变量，用于条件判断
#   BUILD_IMAGEBUILDER: ${{ github.event.inputs.build_imagebuilder }}
  # OVERWRITE_PACKAGE: ${{ github.event.inputs.overwrite_package }}


jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        chmod +x $BUILD_REQUIRED
        $GITHUB_WORKSPACE/$BUILD_REQUIRED
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Cache OpenWrt build
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: true               # 启用 ccache
        mixkey: 'mediatek-filogic' # 根据你的设备平台设置，此处为 mediatek filogic
        prefix: 'openwrt'          # 缓存名前缀，与你的项目名一致
        # toolchain: true          # 默认 true，缓存工具链
        # skip: true               # 默认 true，跳过已编译的工具链
        # clean: false             # 默认 false，不清除缓存

    - name: Merge files of target
      if: hashFiles('target') != ''
      run: |
        if [ -d "target" ]; then
          echo "copy target directory to openwrt root"
          cp -rf target/* /workdir/openwrt/target/

          # 验证移动后的目录结构
          ls -la /workdir/openwrt/target/linux/mediatek/dts/ || echo "Warning: dts directory not found"
        else
          echo "target directory not found"
        fi

    - name: Set up custom feeds
      if: success()
      run: |
        mkdir -p ptmp pkg
        > overwrite_feeds.txt

        # 确保 yq 已安装
        if ! command -v yq &> /dev/null; then
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi

        # 确保 feeds.conf.default 存在
        touch openwrt/feeds.conf.default

        # 定义检查函数：检查是否已存在指定 feed 名称（src-git 或 src-link）
        feed_exists() {
          local feed_name="$1"
          local feed_type="$2"  # "git" 或 "link"
          local pattern=""
          if [ "$feed_type" = "git" ]; then
            pattern="^src-git $feed_name\s"
          elif [ "$feed_type" = "link" ]; then
            pattern="^src-link $feed_name\s"
          else
            return 1
          fi
          grep -qE "$pattern" openwrt/feeds.conf.default 2>/dev/null
        }

        FEED_COUNT=$(yq eval '.feeds | length' $GITHUB_WORKSPACE/$FEEDS_CONFIG)
        for (( i=0; i<$FEED_COUNT; i++ )); do
          name=$(yq eval ".feeds[$i].name" $GITHUB_WORKSPACE/$FEEDS_CONFIG)
          repo=$(yq eval ".feeds[$i].repo" $GITHUB_WORKSPACE/$FEEDS_CONFIG)
          branch=$(yq eval ".feeds[$i].repo_branch" $GITHUB_WORKSPACE/$FEEDS_CONFIG)
          packages=$(yq eval ".feeds[$i].packages[]" $GITHUB_WORKSPACE/$FEEDS_CONFIG)
          overwrite=$(yq eval ".feeds[$i].overwrite" $GITHUB_WORKSPACE/$FEEDS_CONFIG)
          # 处理 name 中的连字符，确保 feed 名称合法
          name=${name//-/}

          # 判断 packages 是否为空
          if [ -z "$packages" ]; then
            # 检查是否已存在 src-git 同名或 src-link mypkg_同名
            if feed_exists "$name" "git"; then
              echo "⚠️ Feed '$name' already exists as src-git, skipping"
            elif feed_exists "mypkg_$name" "link"; then
              echo "⚠️ Feed '$name' already exists as src-link (mypkg_$name), skipping"
            else
              # 添加 src-git
              if [ -n "$branch" ] && [ "$branch" != "null" ]; then
                echo "src-git $name $repo;$branch" >> openwrt/feeds.conf.default
                # echo "echo 'src-git $name $repo;$branch' >>feeds.conf.default" >> $DIY_P1_SH
              else
                echo "src-git $name $repo" >> openwrt/feeds.conf.default
                # echo "echo 'src-git $name $repo' >>feeds.conf.default" >> $DIY_P1_SH
              fi
              echo "✅ Added src-git feed: $name"
              # 记录 overwrite
              if [ "$overwrite" = "true" ]; then
                echo "$name" >> overwrite_feeds.txt
                echo "  🔄 Feed $name will be force-installed (-f)"
              fi
            fi
          else
            # 检查是否已存在 src-link mypkg_同名 或 src-git 同名
            if feed_exists "mypkg_$name" "link"; then
              echo "⚠️ Feed 'mypkg_$name' already exists as src-link, skipping"
            elif feed_exists "$name" "git"; then
              echo "⚠️ Feed '$name' already exists as src-git, skipping"
            else
              # 克隆仓库并复制指定包
              mkdir -p pkg/$name
              git clone "$repo" ptmp/$name
              echo "$packages" | while read -r pkg; do
                if [ -n "$pkg" ]; then
                  if [ -e "ptmp/$name/$pkg" ]; then
                    cp -r "ptmp/$name/$pkg" "pkg/$name/"
                    echo "  ✅ Copied package: $pkg for feed $name"
                  else
                    echo "  ⚠️ Package $pkg not found in repo $name"
                  fi
                fi
              done
            #   cp -r pkg/* ../
              # 添加 src-link
              echo "src-link mypkg_$name $GITHUB_WORKSPACE/pkg/$name" >> openwrt/feeds.conf.default
            #   echo "echo 'src-link mypkg_$name $GITHUB_WORKSPACE/pkg/$name' >>feeds.conf.default" >> $DIY_P1_SH
              echo "✅ Added src-link for feed: $name (packages: ${packages//$'\n'/, })"
              # 记录 overwrite
              if [ "$overwrite" = "true" ]; then
                echo "$name" >> overwrite_feeds.txt
                echo "  🔄 Feed $name will be force-installed (-f)"
              fi
            fi
          fi
        done





    - name: display final feeds
      run: |
        # [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        # chmod +x $DIY_P1_SH
        cd openwrt
        # $GITHUB_WORKSPACE/$DIY_P1_SH
        echo "📄 Current feeds.conf.default content:"
        cat feeds.conf.default

    - name: Update feeds
      run: |
        chmod +x $REPLACE_PACKAGE
        cd openwrt
        ./scripts/feeds update -a
        $GITHUB_WORKSPACE/$REPLACE_PACKAGE

    - name: Install feeds
      id: install_feeds
      run: |
        cd openwrt
        # 正常安装所有 feeds
        ./scripts/feeds install -a

        echo "display overwrite feeds:"
        cat $GITHUB_WORKSPACE/overwrite_feeds.txt

        # 对标记为 overwrite 的 feed 进行强制安装
        if [ -f $GITHUB_WORKSPACE/overwrite_feeds.txt ]; then
          while read -r feed_name; do
            if [ -n "$feed_name" ]; then
              echo "🔧 Force-installing feed: $feed_name"
              ./scripts/feeds install -a -f -p "$feed_name"
            fi
          done < $GITHUB_WORKSPACE/overwrite_feeds.txt
        fi
        echo "status=success" >> $GITHUB_OUTPUT



    - name: Set up custom configuration
      if: success()
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8 V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      if: steps.install_feeds.outputs.status == 'success' && !cancelled()
      id: compilw
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        #make -j$(nproc) || make -j1 || make -j1 V=s
        make -j1 V=w
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV


    - name: Check space usage
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && success() && !cancelled()
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    # 整理编译好的固件
    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        rm -rf *.buildinfo
        rm -rf *.manifest
        rm -rf *.json
        rm -rf *bl2.bin
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # 新增：将 ImageBuilder 作为 Artifact 上传（可选）
    # - name: Upload ImageBuilder as artifact (optional)
    #   uses: actions/upload-artifact@main
    #   if:  steps.build_ib.outputs.status == 'success' && env.BUILD_IMAGEBUILDER == 'true' && !cancelled()
    #   with:
    #     name: ImageBuilder${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
    #     path: openwrt/bin/targets/*/*/immortalwrt-imagebuilder-*.tar.zst

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M-immortalwrt24.10-6.6-cmcc_rax3000m-237")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "cmcc_rax3000m-237大功率固件" >> release.txt
        echo "后台：$WANNA_IP" >> release.txt
        echo "账号：root" >> release.txt
        echo "密码：无" >> release.txt
        echo "默认主题：Bootstrap" >> release.txt
        echo "集成插件：openclash adguardhome mosdns qmodem" >> release.txt
        echo "编译源码：https://github.com/padavanonly/immortalwrt-mt798x-6.6" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v3
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    # # 新增：将 ImageBuilder 上传到 Release（可选）
    # - name: Upload ImageBuilder to release (optional)
    #   uses: softprops/action-gh-release@v1
    #   if: env.BUILD_IMAGEBUILDER == 'true' && steps.tag.outputs.status == 'success' && !cancelled()
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    #   with:
    #     tag_name: ${{ steps.tag.outputs.release_tag }}
    #     files: openwrt/bin/targets/*/*/immortalwrt-imagebuilder-*.tar.zst

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3
